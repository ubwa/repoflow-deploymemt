name: repoflow

services:
  nginx:
    image: nginxinc/nginx-unprivileged:1.29.3-alpine
    restart: unless-stopped
    ports:
      - "8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - server
      - client
      - hasura
    deploy:
      replicas: 1
    networks:
      - repoflow-net

  client:
    image: api.repoflow.io/repoflow-public/docker-public/library/repoflow-client:0.8.8
    restart: unless-stopped
    environment:
      - REPOFLOW_SERVER=${REPOFLOW_SERVER:-http://localhost:8080/api}
      - IS_PRINT_ENV=${IS_PRINT_ENV:-false}
      - IGNORE_FRONTEND_URL_MISMATCH=${IGNORE_FRONTEND_URL_MISMATCH:-false}
    volumes:
      - ./client/env.js:/usr/share/nginx/html/env.js:ro
      - ./client/analytics.js:/usr/share/nginx/html/analytics.js:ro
    deploy:
      replicas: 1
    networks:
      - repoflow-net

  server:
    image: api.repoflow.io/repoflow-public/docker-public/library/repoflow-server:0.8.8
    restart: unless-stopped
    environment:
      # Secrets (from secrets.env — run with: docker compose --env-file secrets.env up)
      - GENERAL_COOKIE_SECRET=${GENERAL_COOKIE_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - RESET_PASSWORD_JWT_SECRET=${RESET_PASSWORD_JWT_SECRET}
      - PERSONAL_ACCESS_TOKEN_JWT_SECRET=${PERSONAL_ACCESS_TOKEN_JWT_SECRET}
      - HASURA_ADMIN_SECRET=${HASURA_ADMIN_SECRET}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      # Application config
      - IS_PRINT_ENV=true
      - SERVER_PORT=3000
      - SERVER_URL=${SERVER_URL}/api
      - FRONTEND_URL=${FRONTEND_URL}
      - TMP_FOLDER=/tmp
      - S3_USE_SSL=false
      - S3_PORT=9000
      - S3_END_POINT=minio
      - S3_BUCKET=repoflow
      - INSTALLATION_METHOD=docker-compose
      - HASURA_URL=http://hasura:8080/v1/graphql
      - HASURA_URL_REST=http://hasura:8080/api/rest
      - IS_SMART_SEARCH_ENABLED=false
      - DEFAULT_SEARCH_LIMIT=10
      - IS_REDIS_ENABLED=false
      - IS_REMOTE_CACHE_ENABLED=true
      - COOKIE_EXPIRY_IN_SECONDS=2592000
      - JWS_ALGORITHM=HS256
      - DEFAULT_ADMIN_USER_NAME=admin
      - DEFAULT_ADMIN_PASSWORD=password
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
      - OUTGOING_PROXY_BYPASS_INTERNAL=${OUTGOING_PROXY_BYPASS_INTERNAL:-true}
      - OUTGOING_PROXY_STARTUP_CHECK=${OUTGOING_PROXY_STARTUP_CHECK:-true}
      - IS_PRINT_ENV=${IS_PRINT_ENV:-false}
      - CONSOLE_LOG_LEVEL=${CONSOLE_LOG_LEVEL:-http}
      - ENABLE_IMMEDIATE_REQUEST_LOGGING=${ENABLE_IMMEDIATE_REQUEST_LOGGING:-false}
      - ENABLE_ONGOING_REQUEST_TRACKING=${ENABLE_ONGOING_REQUEST_TRACKING:-false}
      - ENABLE_AUTH_LOGGING=${ENABLE_AUTH_LOGGING:-false}
    volumes:
      - server-logs:/var/log/repoflow
      - grype-db:/srv/vulnerabilitiesScanning
    depends_on:
      - hasura
    deploy:
      replicas: 1
    networks:
      - repoflow-net

  postgresql:
    image: postgres:14
    restart: unless-stopped
    environment:
      # Secrets (from secrets.env — run with: docker compose --env-file secrets.env up)
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: repoflow
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d repoflow -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    deploy:
      replicas: 1
    networks:
      - repoflow-net

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    restart: unless-stopped
    environment:
      # Secrets (from secrets.env — run with: docker compose --env-file secrets.env up)
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    deploy:
      replicas: 1
    networks:
      - repoflow-net

  hasura:
    image: hasura/graphql-engine:v2.48.10
    restart: unless-stopped
    environment:
      # Secrets (from secrets.env — run with: docker compose --env-file secrets.env up)
      - HASURA_GRAPHQL_ADMIN_SECRET=${HASURA_GRAPHQL_ADMIN_SECRET}
      - HASURA_GRAPHQL_JWT_SECRET=${HASURA_GRAPHQL_JWT_SECRET}
      # Application config
      - HASURA_GRAPHQL_ENABLE_CONSOLE=true
      - HASURA_GRAPHQL_DEV_MODE=true
      - HASURA_GRAPHQL_ENABLED_LOG_TYPES=startup,http-log,webhook-log,websocket-log,query-log
      - HASURA_GRAPHQL_ENABLE_TELEMETRY=false
      - HASURA_GRAPHQL_UNAUTHORIZED_ROLE=anonymous
      - HASURA_GRAPHQL_METADATA_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql:5432/repoflow
      - HASURA_GRAPHQL_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql:5432/repoflow
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - repoflow-net

networks:
  repoflow-net:
    driver: bridge

volumes:
  minio-data:
  server-logs:
  postgresql-data:
  grype-db:
